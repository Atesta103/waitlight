name: App CI

on:
  pull_request:
    paths-ignore:
      - "storybook-static/**"
      - "doc/**"
  push:
    branches: [main]
    paths-ignore:
      - "storybook-static/**"

jobs:
  app-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run check:app-ui-contract
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          STRIPE_SECRET_KEY: dummy_stripe_key_for_build
          SUPABASE_SERVICE_ROLE_KEY: dummy_supabase_role_key_for_build
